<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SkinnyV Visualizer</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { background: #000; overflow: hidden; width: 100vw; height: 100vh; }
        #viz-canvas { display: block; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1; }
        #close-btn {
            position: fixed; top: 10px; right: 10px; z-index: 999;
            background: rgba(255,255,255,0.1); color: #fff; border: 1px solid rgba(255,255,255,0.2);
            border-radius: 6px; padding: 6px 14px; font-size: 13px; cursor: pointer;
            font-family: -apple-system, sans-serif; opacity: 0; transition: opacity 0.3s;
        }
        #close-btn:hover { background: rgba(255,255,255,0.2); }
        body:hover #close-btn { opacity: 1; }
        #debug {
            position: fixed; bottom: 10px; left: 10px; z-index: 999;
            color: #0f0; font-family: monospace; font-size: 11px; opacity: 0.5;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <canvas id="viz-canvas"></canvas>
    <button id="close-btn" onclick="tryClose()">✕ Close (ESC)</button>
    <div id="debug">SkinnyV Visualizer</div>
    <script>
        // ═══════════════════════════════════════════════════════
        // SkinnyV Visualizer — fully self-contained, no external deps
        // ═══════════════════════════════════════════════════════

        var dbg = document.getElementById("debug");
        function dlog(msg) {
            dbg.textContent = msg;
            console.log("[SkinnyV] " + msg);
        }

        dlog("Script loaded");

        var canvas = document.getElementById("viz-canvas");
        var ctx = canvas.getContext("2d");
        ctx.fillStyle = "#000";
        ctx.fillRect(0, 0, 100, 100);
        dlog("Canvas ready");

        // ── State ──────────────────────────────────────────────
        var mode = localStorage.getItem("skinnyv-mode") || "spectrum";
        var theme = localStorage.getItem("skinnyv-theme") || "aurora";
        var bins = new Float32Array(128);
        var volume = 0, beatPulse = 0;
        var smoothedBins = new Float32Array(128);
        var waveformHistory = [];
        var particles = [];

        var THEMES = {
            aurora:  ["#00f5d4", "#00bbf9", "#9b5de5", "#f15bb5"],
            sunset:  ["#ff6b35", "#f7931e", "#f15bb5", "#fee440"],
            electric:["#00bbf9", "#00f5d4", "#0077b6", "#03045e"],
            fire:    ["#ff6b35", "#f72585", "#ffba08", "#dc2f02"],
            mono:    ["#ffffff", "#cccccc", "#888888", "#444444"],
        };

        // ── Resize ─────────────────────────────────────────────
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            dlog("Resized: " + canvas.width + "x" + canvas.height);
        }
        resize();
        window.addEventListener("resize", resize);

        // ── Close ──────────────────────────────────────────────
        function tryClose() {
            dlog("Attempting close...");
            if (window.__TAURI__ && window.__TAURI__.window) {
                try {
                    var w = window.__TAURI__.window.getCurrentWindow();
                    dlog("Got Tauri window: " + w.label);
                    w.close();
                    return;
                } catch(e) { dlog("Tauri close failed: " + e); }
            }
            window.close();
        }
        window.addEventListener("keydown", function(e) {
            if (e.key === "Escape") tryClose();
        });

        // ── Tauri event connection with retry ──────────────────
        var eventsConnected = false;
        var eventTries = 0;
        function tryConnectEvents() {
            eventTries++;
            if (!window.__TAURI__) {
                dlog("Waiting for __TAURI__... (" + eventTries + ")");
                setTimeout(tryConnectEvents, 200);
                return;
            }
            if (!window.__TAURI__.event) {
                dlog("__TAURI__ present but no .event (" + eventTries + ")");
                setTimeout(tryConnectEvents, 200);
                return;
            }
            try {
                var evt = window.__TAURI__.event;
                evt.listen("audio-data", function(event) {
                    if (!eventsConnected) {
                        eventsConnected = true;
                        dlog("Audio data flowing!");
                    }
                    var d = event.payload;
                    if (d && d.bins) {
                        bins = new Float32Array(d.bins);
                        volume = d.volume;
                        if (d.beat) beatPulse = 1.0;
                    }
                });
                evt.listen("settings-change", function(event) {
                    var p = event.payload;
                    if (p.key === "mode") mode = p.value;
                    if (p.key === "theme") theme = p.value;
                });
                dlog("Tauri events connected after " + eventTries + " tries");
            } catch(e) {
                dlog("Event connect failed: " + e);
                setTimeout(tryConnectEvents, 200);
            }
        }
        tryConnectEvents();

        // ── Theme ──────────────────────────────────────────────
        function colors() { return THEMES[theme] || THEMES.aurora; }

        // ── Render loop ────────────────────────────────────────
        function render() {
            ctx.fillStyle = "rgba(0,0,0,0.15)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            for (var i = 0; i < bins.length; i++)
                smoothedBins[i] = smoothedBins[i] * 0.7 + bins[i] * 0.3;
            beatPulse *= 0.92;

            try {
                if (mode === "spectrum") renderSpectrum();
                else if (mode === "waveform") renderWaveform();
                else if (mode === "circular") renderCircular();
                else if (mode === "particles") renderParticles();
            } catch(e) {}

            requestAnimationFrame(render);
        }

        function renderSpectrum() {
            var c = colors(), w = canvas.width, h = canvas.height;
            var n = 64, bw = w / n, gap = bw * 0.15;
            for (var i = 0; i < n; i++) {
                var v = smoothedBins[Math.floor((i / n) * smoothedBins.length)];
                var bh = v * h * 0.85, x = i * bw + gap/2, y = h - bh;
                var col = c[Math.min(Math.floor((i/n)*c.length), c.length-1)];
                ctx.fillStyle = col;
                ctx.fillRect(x, y, bw-gap, bh);
                ctx.shadowBlur = 20*v; ctx.shadowColor = col;
                ctx.fillRect(x, y, bw-gap, bh); ctx.shadowBlur = 0;
                ctx.globalAlpha = 0.2; ctx.fillRect(x, h, bw-gap, -bh*0.3); ctx.globalAlpha = 1;
            }
            if (beatPulse > 0.1) { ctx.fillStyle = "rgba(255,255,255,"+(beatPulse*0.05)+")"; ctx.fillRect(0,0,w,h); }
        }

        function renderWaveform() {
            var c = colors(), w = canvas.width, h = canvas.height, mid = h/2;
            var f = new Float32Array(smoothedBins.length);
            for (var i=0; i<smoothedBins.length; i++) f[i] = smoothedBins[i];
            waveformHistory.push(f);
            if (waveformHistory.length > 5) waveformHistory.shift();
            for (var l=0; l<waveformHistory.length; l++) {
                var d = waveformHistory[l];
                ctx.strokeStyle = c[l%c.length]; ctx.globalAlpha = (l+1)/waveformHistory.length*0.6;
                ctx.lineWidth = 2; ctx.beginPath();
                for (var i=0; i<d.length; i++) {
                    var x=(i/d.length)*w, y=mid+(d[i]-0.5)*h*0.6;
                    if (i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
                }
                ctx.stroke();
            }
            ctx.globalAlpha = 1; ctx.strokeStyle = c[0]; ctx.lineWidth = 4;
            ctx.shadowBlur = 15; ctx.shadowColor = c[0]; ctx.beginPath();
            for (var i=0; i<smoothedBins.length; i++) {
                var x=(i/smoothedBins.length)*w, y=mid+(smoothedBins[i]-0.5)*h*0.6;
                if (i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
            }
            ctx.stroke(); ctx.shadowBlur = 0;
        }

        function renderCircular() {
            var c = colors(), w = canvas.width, h = canvas.height;
            var cx=w/2, cy=h/2, br=Math.min(w,h)*0.2, me=Math.min(w,h)*0.25, segs=128;
            for (var i=0; i<segs; i++) {
                var a=(i/segs)*Math.PI*2-Math.PI/2;
                var v=smoothedBins[Math.floor((i/segs)*smoothedBins.length)];
                var r2=br+v*me, col=c[Math.floor((i/segs)*c.length)%c.length];
                ctx.strokeStyle=col; ctx.lineWidth=3; ctx.shadowBlur=10*v; ctx.shadowColor=col;
                ctx.beginPath();
                ctx.moveTo(cx+Math.cos(a)*br, cy+Math.sin(a)*br);
                ctx.lineTo(cx+Math.cos(a)*r2, cy+Math.sin(a)*r2);
                ctx.stroke();
            }
            ctx.shadowBlur=0;
            if (beatPulse>0.1) {
                ctx.strokeStyle=c[0]; ctx.globalAlpha=beatPulse*0.5; ctx.lineWidth=2;
                ctx.beginPath(); ctx.arc(cx,cy,br*(1+beatPulse*0.2),0,Math.PI*2); ctx.stroke(); ctx.globalAlpha=1;
            }
            var g=ctx.createRadialGradient(cx,cy,0,cx,cy,br);
            g.addColorStop(0,c[0]+"40"); g.addColorStop(1,"transparent");
            ctx.fillStyle=g; ctx.fillRect(cx-br,cy-br,br*2,br*2);
        }

        function renderParticles() {
            var c=colors(), w=canvas.width, h=canvas.height, cx=w/2, cy=h/2;
            if (beatPulse>0.5) {
                var n=Math.floor(beatPulse*20);
                for (var i=0;i<n;i++) {
                    var a=Math.random()*Math.PI*2, s=2+Math.random()*6*(volume*10);
                    particles.push({x:cx,y:cy,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:1,col:c[Math.floor(Math.random()*c.length)],sz:2+Math.random()*4});
                }
            }
            if (volume>0.01) {
                var n2=Math.floor(volume*5);
                for (var i=0;i<n2;i++) {
                    var a2=Math.random()*Math.PI*2, s2=1+Math.random()*3*(volume*10);
                    particles.push({x:cx+(Math.random()-0.5)*100,y:cy+(Math.random()-0.5)*100,vx:Math.cos(a2)*s2,vy:Math.sin(a2)*s2,life:1,col:c[Math.floor(Math.random()*c.length)],sz:1+Math.random()*3});
                }
            }
            for (var i=particles.length-1;i>=0;i--) {
                var p=particles[i]; p.x+=p.vx; p.y+=p.vy; p.vx*=0.99; p.vy*=0.99; p.life-=0.01;
                if (p.life<=0||p.x<-50||p.x>w+50||p.y<-50||p.y>h+50) { particles.splice(i,1); continue; }
                ctx.globalAlpha=p.life; ctx.fillStyle=p.col; ctx.shadowBlur=p.sz*3; ctx.shadowColor=p.col;
                ctx.beginPath(); ctx.arc(p.x,p.y,p.sz,0,Math.PI*2); ctx.fill();
            }
            ctx.globalAlpha=1; ctx.shadowBlur=0;
            if (particles.length>2000) particles.splice(0,particles.length-2000);
        }

        // Start rendering
        dlog("Starting render loop, mode=" + mode + " theme=" + theme);
        requestAnimationFrame(render);
    </script>
</body>
</html>
