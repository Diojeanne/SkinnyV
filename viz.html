<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SkinnyV Visualizer</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { background: #000; overflow: hidden; width: 100vw; height: 100vh; }
        #viz-canvas { display: block; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; }
        #error-msg { color: #ff4757; font-family: monospace; font-size: 14px; padding: 20px; display: none; }
    </style>
</head>
<body>
    <canvas id="viz-canvas"></canvas>
    <div id="error-msg"></div>
    <script type="module">
        // ═══════════════════════════════════════════════════════
        // SkinnyV Visualizer — self-contained, no external imports
        // ═══════════════════════════════════════════════════════

        const canvas = document.getElementById("viz-canvas");
        const ctx = canvas.getContext("2d");
        const errEl = document.getElementById("error-msg");

        function showError(msg) {
            errEl.textContent = "[SkinnyV] " + msg;
            errEl.style.display = "block";
            console.error("[SkinnyV] " + msg);
        }

        // ── State ──────────────────────────────────────────────
        let mode = localStorage.getItem("skinnyv-mode") || "spectrum";
        let theme = localStorage.getItem("skinnyv-theme") || "aurora";
        let bins = new Float32Array(128);
        let volume = 0, peak = 0, beat = false, beatPulse = 0;
        let smoothedBins = new Float32Array(128);
        let waveformHistory = [];
        let particles = [];

        const THEMES = {
            aurora:  ["#00f5d4", "#00bbf9", "#9b5de5", "#f15bb5"],
            sunset:  ["#ff6b35", "#f7931e", "#f15bb5", "#fee440"],
            electric:["#00bbf9", "#00f5d4", "#0077b6", "#03045e"],
            fire:    ["#ff6b35", "#f72585", "#ffba08", "#dc2f02"],
            mono:    ["#ffffff", "#cccccc", "#888888", "#444444"],
        };

        // ── Resize ─────────────────────────────────────────────
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resize();
        window.addEventListener("resize", resize);

        // ── ESC to close ──────────────────────────────────────
        window.addEventListener("keydown", (e) => {
            if (e.key === "Escape") {
                // Try Tauri close
                import("@tauri-apps/api/window")
                    .then(m => m.getCurrentWindow().close())
                    .catch(() => window.close());
            }
        });

        // ── Tauri event listeners ──────────────────────────────
        let tauriReady = false;
        try {
            const eventMod = await import("@tauri-apps/api/event");
            await eventMod.listen("audio-data", (event) => {
                const d = event.payload;
                if (d && d.bins) {
                    bins = new Float32Array(d.bins);
                    volume = d.volume;
                    peak = d.peak;
                    if (d.beat) { beat = true; beatPulse = 1.0; }
                }
            });
            await eventMod.listen("settings-change", (event) => {
                const { key, value } = event.payload;
                if (key === "mode") mode = value;
                if (key === "theme") theme = value;
            });
            tauriReady = true;
            console.log("[SkinnyV] Visualizer: Tauri events connected");
        } catch (e) {
            showError("Failed to connect Tauri events: " + e);
        }

        // ── Render loop ────────────────────────────────────────
        function getThemeColors() {
            return THEMES[theme] || THEMES.aurora;
        }

        function render() {
            ctx.fillStyle = "rgba(0,0,0,0.15)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            for (let i = 0; i < bins.length; i++) {
                smoothedBins[i] = smoothedBins[i] * 0.7 + bins[i] * 0.3;
            }
            beatPulse *= 0.92;

            try {
                switch (mode) {
                    case "spectrum": renderSpectrum(); break;
                    case "waveform": renderWaveform(); break;
                    case "circular": renderCircular(); break;
                    case "particles": renderParticles(); break;
                }
            } catch (e) {
                // don't kill the loop
            }

            requestAnimationFrame(render);
        }

        function renderSpectrum() {
            const colors = getThemeColors();
            const w = canvas.width, h = canvas.height;
            const barCount = 64;
            const barWidth = w / barCount;
            const gap = barWidth * 0.15;

            for (let i = 0; i < barCount; i++) {
                const binIdx = Math.floor((i / barCount) * smoothedBins.length);
                const value = smoothedBins[binIdx];
                const barH = value * h * 0.85;
                const x = i * barWidth + gap / 2;
                const y = h - barH;
                const color = colors[Math.min(Math.floor((i / barCount) * colors.length), colors.length - 1)];

                ctx.fillStyle = color;
                ctx.fillRect(x, y, barWidth - gap, barH);
                ctx.shadowBlur = 20 * value;
                ctx.shadowColor = color;
                ctx.fillRect(x, y, barWidth - gap, barH);
                ctx.shadowBlur = 0;
                ctx.globalAlpha = 0.2;
                ctx.fillRect(x, h, barWidth - gap, -barH * 0.3);
                ctx.globalAlpha = 1.0;
            }
            if (beatPulse > 0.1) {
                ctx.fillStyle = `rgba(255,255,255,${beatPulse * 0.05})`;
                ctx.fillRect(0, 0, w, h);
            }
        }

        function renderWaveform() {
            const colors = getThemeColors();
            const w = canvas.width, h = canvas.height, midY = h / 2;
            const frame = new Float32Array(smoothedBins.length);
            for (let i = 0; i < smoothedBins.length; i++) frame[i] = smoothedBins[i];
            waveformHistory.push(frame);
            if (waveformHistory.length > 5) waveformHistory.shift();

            for (let layer = 0; layer < waveformHistory.length; layer++) {
                const data = waveformHistory[layer];
                ctx.strokeStyle = colors[layer % colors.length];
                ctx.globalAlpha = (layer + 1) / waveformHistory.length * 0.6;
                ctx.lineWidth = 2;
                ctx.beginPath();
                for (let i = 0; i < data.length; i++) {
                    const x = (i / data.length) * w;
                    const y = midY + (data[i] - 0.5) * h * 0.6;
                    if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
                }
                ctx.stroke();
            }
            ctx.globalAlpha = 1.0;
            ctx.strokeStyle = colors[0];
            ctx.lineWidth = 4;
            ctx.shadowBlur = 15;
            ctx.shadowColor = colors[0];
            ctx.beginPath();
            for (let i = 0; i < smoothedBins.length; i++) {
                const x = (i / smoothedBins.length) * w;
                const y = midY + (smoothedBins[i] - 0.5) * h * 0.6;
                if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
            }
            ctx.stroke();
            ctx.shadowBlur = 0;
        }

        function renderCircular() {
            const colors = getThemeColors();
            const w = canvas.width, h = canvas.height;
            const cx = w / 2, cy = h / 2;
            const baseRadius = Math.min(w, h) * 0.2;
            const maxExt = Math.min(w, h) * 0.25;
            const segs = 128;

            for (let i = 0; i < segs; i++) {
                const angle = (i / segs) * Math.PI * 2 - Math.PI / 2;
                const binIdx = Math.floor((i / segs) * smoothedBins.length);
                const value = smoothedBins[binIdx];
                const r2 = baseRadius + value * maxExt;
                const color = colors[Math.floor((i / segs) * colors.length) % colors.length];
                ctx.strokeStyle = color;
                ctx.lineWidth = 3;
                ctx.shadowBlur = 10 * value;
                ctx.shadowColor = color;
                ctx.beginPath();
                ctx.moveTo(cx + Math.cos(angle) * baseRadius, cy + Math.sin(angle) * baseRadius);
                ctx.lineTo(cx + Math.cos(angle) * r2, cy + Math.sin(angle) * r2);
                ctx.stroke();
            }
            ctx.shadowBlur = 0;
            if (beatPulse > 0.1) {
                ctx.strokeStyle = colors[0];
                ctx.globalAlpha = beatPulse * 0.5;
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.arc(cx, cy, baseRadius * (1 + beatPulse * 0.2), 0, Math.PI * 2);
                ctx.stroke();
                ctx.globalAlpha = 1.0;
            }
            const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, baseRadius);
            grad.addColorStop(0, colors[0] + "40");
            grad.addColorStop(1, "transparent");
            ctx.fillStyle = grad;
            ctx.fillRect(cx - baseRadius, cy - baseRadius, baseRadius * 2, baseRadius * 2);
        }

        function renderParticles() {
            const colors = getThemeColors();
            const w = canvas.width, h = canvas.height;
            const cx = w / 2, cy = h / 2;

            if (beatPulse > 0.5) {
                const count = Math.floor(beatPulse * 20);
                for (let i = 0; i < count; i++) {
                    const angle = Math.random() * Math.PI * 2;
                    const speed = 2 + Math.random() * 6 * (volume * 10);
                    particles.push({ x: cx, y: cy, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed,
                        life: 1.0, color: colors[Math.floor(Math.random() * colors.length)], size: 2 + Math.random() * 4 });
                }
            }
            if (volume > 0.01) {
                const count = Math.floor(volume * 5);
                for (let i = 0; i < count; i++) {
                    const angle = Math.random() * Math.PI * 2;
                    const speed = 1 + Math.random() * 3 * (volume * 10);
                    particles.push({ x: cx + (Math.random() - 0.5) * 100, y: cy + (Math.random() - 0.5) * 100,
                        vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed, life: 1.0,
                        color: colors[Math.floor(Math.random() * colors.length)], size: 1 + Math.random() * 3 });
                }
            }
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.x += p.vx; p.y += p.vy; p.vx *= 0.99; p.vy *= 0.99; p.life -= 0.01;
                if (p.life <= 0 || p.x < -50 || p.x > w + 50 || p.y < -50 || p.y > h + 50) { particles.splice(i, 1); continue; }
                ctx.globalAlpha = p.life;
                ctx.fillStyle = p.color;
                ctx.shadowBlur = p.size * 3;
                ctx.shadowColor = p.color;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();
            }
            ctx.globalAlpha = 1.0; ctx.shadowBlur = 0;
            if (particles.length > 2000) particles.splice(0, particles.length - 2000);
        }

        // Start
        ctx.fillStyle = "#000";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        console.log("[SkinnyV] Visualizer starting, mode:", mode, "theme:", theme, "tauriReady:", tauriReady);
        requestAnimationFrame(render);
    </script>
</body>
</html>
