<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SkinnyV Visualizer</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { background: #000; overflow: hidden; width: 100vw; height: 100vh; }
        #viz-canvas { display: block; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; }
    </style>
</head>
<body>
    <canvas id="viz-canvas"></canvas>
    <script>
        // ═══════════════════════════════════════════════════════
        // SkinnyV Visualizer — plain script, uses window.__TAURI__
        // ═══════════════════════════════════════════════════════

        var canvas = document.getElementById("viz-canvas");
        var ctx = canvas.getContext("2d");

        // State
        var mode = localStorage.getItem("skinnyv-mode") || "spectrum";
        var theme = localStorage.getItem("skinnyv-theme") || "aurora";
        var bins = new Float32Array(128);
        var volume = 0, peak = 0, beat = false, beatPulse = 0;
        var smoothedBins = new Float32Array(128);
        var waveformHistory = [];
        var particles = [];

        var THEMES = {
            aurora:  ["#00f5d4", "#00bbf9", "#9b5de5", "#f15bb5"],
            sunset:  ["#ff6b35", "#f7931e", "#f15bb5", "#fee440"],
            electric:["#00bbf9", "#00f5d4", "#0077b6", "#03045e"],
            fire:    ["#ff6b35", "#f72585", "#ffba08", "#dc2f02"],
            mono:    ["#ffffff", "#cccccc", "#888888", "#444444"],
        };

        // Resize
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resize();
        window.addEventListener("resize", resize);

        // ESC to close
        window.addEventListener("keydown", function(e) {
            if (e.key === "Escape") {
                if (window.__TAURI__ && window.__TAURI__.window) {
                    try { window.__TAURI__.window.getCurrentWindow().close(); } catch(_) {}
                }
            }
        });

        // Connect Tauri events
        function connectEvents() {
            if (!window.__TAURI__ || !window.__TAURI__.event) {
                // Tauri not ready yet, retry in 100ms
                setTimeout(connectEvents, 100);
                return;
            }

            var evt = window.__TAURI__.event;

            evt.listen("audio-data", function(event) {
                var d = event.payload;
                if (d && d.bins) {
                    bins = new Float32Array(d.bins);
                    volume = d.volume;
                    peak = d.peak;
                    if (d.beat) { beat = true; beatPulse = 1.0; }
                }
            });

            evt.listen("settings-change", function(event) {
                var p = event.payload;
                if (p.key === "mode") mode = p.value;
                if (p.key === "theme") theme = p.value;
            });

            console.log("[SkinnyV] Visualizer: Tauri events connected");
        }
        connectEvents();

        // Theme helper
        function getThemeColors() { return THEMES[theme] || THEMES.aurora; }

        // Render loop
        function render() {
            ctx.fillStyle = "rgba(0,0,0,0.15)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            for (var i = 0; i < bins.length; i++) {
                smoothedBins[i] = smoothedBins[i] * 0.7 + bins[i] * 0.3;
            }
            beatPulse *= 0.92;

            try {
                switch (mode) {
                    case "spectrum": renderSpectrum(); break;
                    case "waveform": renderWaveform(); break;
                    case "circular": renderCircular(); break;
                    case "particles": renderParticles(); break;
                }
            } catch(e) {}

            requestAnimationFrame(render);
        }

        function renderSpectrum() {
            var colors = getThemeColors();
            var w = canvas.width, h = canvas.height;
            var barCount = 64, barWidth = w / barCount, gap = barWidth * 0.15;
            for (var i = 0; i < barCount; i++) {
                var binIdx = Math.floor((i / barCount) * smoothedBins.length);
                var value = smoothedBins[binIdx];
                var barH = value * h * 0.85;
                var x = i * barWidth + gap / 2, y = h - barH;
                var color = colors[Math.min(Math.floor((i / barCount) * colors.length), colors.length - 1)];
                ctx.fillStyle = color;
                ctx.fillRect(x, y, barWidth - gap, barH);
                ctx.shadowBlur = 20 * value;
                ctx.shadowColor = color;
                ctx.fillRect(x, y, barWidth - gap, barH);
                ctx.shadowBlur = 0;
                ctx.globalAlpha = 0.2;
                ctx.fillRect(x, h, barWidth - gap, -barH * 0.3);
                ctx.globalAlpha = 1.0;
            }
            if (beatPulse > 0.1) {
                ctx.fillStyle = "rgba(255,255,255," + (beatPulse * 0.05) + ")";
                ctx.fillRect(0, 0, w, h);
            }
        }

        function renderWaveform() {
            var colors = getThemeColors();
            var w = canvas.width, h = canvas.height, midY = h / 2;
            var frame = new Float32Array(smoothedBins.length);
            for (var i = 0; i < smoothedBins.length; i++) frame[i] = smoothedBins[i];
            waveformHistory.push(frame);
            if (waveformHistory.length > 5) waveformHistory.shift();
            for (var layer = 0; layer < waveformHistory.length; layer++) {
                var data = waveformHistory[layer];
                ctx.strokeStyle = colors[layer % colors.length];
                ctx.globalAlpha = (layer + 1) / waveformHistory.length * 0.6;
                ctx.lineWidth = 2;
                ctx.beginPath();
                for (var i = 0; i < data.length; i++) {
                    var x = (i / data.length) * w, y = midY + (data[i] - 0.5) * h * 0.6;
                    if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
                }
                ctx.stroke();
            }
            ctx.globalAlpha = 1.0;
            ctx.strokeStyle = colors[0];
            ctx.lineWidth = 4;
            ctx.shadowBlur = 15;
            ctx.shadowColor = colors[0];
            ctx.beginPath();
            for (var i = 0; i < smoothedBins.length; i++) {
                var x = (i / smoothedBins.length) * w, y = midY + (smoothedBins[i] - 0.5) * h * 0.6;
                if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
            }
            ctx.stroke();
            ctx.shadowBlur = 0;
        }

        function renderCircular() {
            var colors = getThemeColors();
            var w = canvas.width, h = canvas.height;
            var cx = w / 2, cy = h / 2;
            var baseRadius = Math.min(w, h) * 0.2;
            var maxExt = Math.min(w, h) * 0.25;
            var segs = 128;
            for (var i = 0; i < segs; i++) {
                var angle = (i / segs) * Math.PI * 2 - Math.PI / 2;
                var binIdx = Math.floor((i / segs) * smoothedBins.length);
                var value = smoothedBins[binIdx];
                var r2 = baseRadius + value * maxExt;
                var color = colors[Math.floor((i / segs) * colors.length) % colors.length];
                ctx.strokeStyle = color;
                ctx.lineWidth = 3;
                ctx.shadowBlur = 10 * value;
                ctx.shadowColor = color;
                ctx.beginPath();
                ctx.moveTo(cx + Math.cos(angle) * baseRadius, cy + Math.sin(angle) * baseRadius);
                ctx.lineTo(cx + Math.cos(angle) * r2, cy + Math.sin(angle) * r2);
                ctx.stroke();
            }
            ctx.shadowBlur = 0;
            if (beatPulse > 0.1) {
                ctx.strokeStyle = colors[0];
                ctx.globalAlpha = beatPulse * 0.5;
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.arc(cx, cy, baseRadius * (1 + beatPulse * 0.2), 0, Math.PI * 2);
                ctx.stroke();
                ctx.globalAlpha = 1.0;
            }
            var grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, baseRadius);
            grad.addColorStop(0, colors[0] + "40");
            grad.addColorStop(1, "transparent");
            ctx.fillStyle = grad;
            ctx.fillRect(cx - baseRadius, cy - baseRadius, baseRadius * 2, baseRadius * 2);
        }

        function renderParticles() {
            var colors = getThemeColors();
            var w = canvas.width, h = canvas.height;
            var cx = w / 2, cy = h / 2;
            if (beatPulse > 0.5) {
                var count = Math.floor(beatPulse * 20);
                for (var i = 0; i < count; i++) {
                    var angle = Math.random() * Math.PI * 2;
                    var speed = 2 + Math.random() * 6 * (volume * 10);
                    particles.push({x:cx, y:cy, vx:Math.cos(angle)*speed, vy:Math.sin(angle)*speed,
                        life:1.0, color:colors[Math.floor(Math.random()*colors.length)], size:2+Math.random()*4});
                }
            }
            if (volume > 0.01) {
                var count2 = Math.floor(volume * 5);
                for (var i = 0; i < count2; i++) {
                    var angle2 = Math.random() * Math.PI * 2;
                    var speed2 = 1 + Math.random() * 3 * (volume * 10);
                    particles.push({x:cx+(Math.random()-0.5)*100, y:cy+(Math.random()-0.5)*100,
                        vx:Math.cos(angle2)*speed2, vy:Math.sin(angle2)*speed2, life:1.0,
                        color:colors[Math.floor(Math.random()*colors.length)], size:1+Math.random()*3});
                }
            }
            for (var i = particles.length - 1; i >= 0; i--) {
                var p = particles[i];
                p.x += p.vx; p.y += p.vy; p.vx *= 0.99; p.vy *= 0.99; p.life -= 0.01;
                if (p.life <= 0 || p.x < -50 || p.x > w + 50 || p.y < -50 || p.y > h + 50) {
                    particles.splice(i, 1); continue;
                }
                ctx.globalAlpha = p.life;
                ctx.fillStyle = p.color;
                ctx.shadowBlur = p.size * 3;
                ctx.shadowColor = p.color;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();
            }
            ctx.globalAlpha = 1.0; ctx.shadowBlur = 0;
            if (particles.length > 2000) particles.splice(0, particles.length - 2000);
        }

        // Start
        ctx.fillStyle = "#000";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        console.log("[SkinnyV] Visualizer starting, mode:", mode, "theme:", theme);
        requestAnimationFrame(render);
    </script>
</body>
</html>
