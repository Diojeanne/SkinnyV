<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SkinnyV</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif; }

        /* Error display — always visible */
        #fatal-error {
            display: none; position: fixed; top: 0; left: 0; right: 0; z-index: 9999;
            background: #ff4757; color: #fff; padding: 16px; font-family: monospace; font-size: 13px;
        }

        /* Control panel */
        #control-panel {
            max-width: 420px; margin: 0 auto; padding: 24px 20px;
            display: none; flex-direction: column; gap: 24px; min-height: 100vh;
            background: #0a0a0f; color: #e4e4ef;
        }
        .panel-header { display: flex; align-items: center; justify-content: space-between; }
        .logo { font-size: 28px; font-weight: 700; letter-spacing: -0.5px;
            background: linear-gradient(135deg, #00f5d4, #9b5de5);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .status-pill { display: flex; align-items: center; gap: 8px; padding: 6px 14px;
            background: #14141c; border: 1px solid #2a2a3a; border-radius: 20px; font-size: 12px; color: #6b6b80; }
        .status-pill.error { border-color: #ff4757; color: #ff4757; }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #6b6b80; }
        .status-dot.active { background: #00f5d4; box-shadow: 0 0 8px rgba(0,245,212,0.3); }
        .panel-section h2 { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 1.2px; color: #6b6b80; margin-bottom: 12px; }
        .select { width: 100%; padding: 12px 14px; background: #14141c; border: 1px solid #2a2a3a; border-radius: 10px; color: #e4e4ef; font-size: 14px; outline: none; appearance: none; cursor: pointer; margin-bottom: 12px; }
        .select:focus { border-color: #00f5d4; box-shadow: 0 0 0 3px rgba(0,245,212,0.3); }
        .btn { width: 100%; padding: 12px 16px; border: none; border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; }
        .btn-primary { background: #00f5d4; color: #0a0a0f; }
        .btn-stop { background: #ff4757; color: #fff; }
        .monitor-list { display: flex; flex-direction: column; gap: 8px; }
        .monitor-card { display: flex; align-items: center; gap: 12px; padding: 12px 14px; background: #14141c; border: 1px solid #2a2a3a; border-radius: 10px; }
        .monitor-card.primary { border-color: #00f5d4; }
        .monitor-info { flex: 1; display: flex; flex-direction: column; }
        .monitor-name { font-size: 14px; font-weight: 500; }
        .monitor-res { font-size: 12px; color: #6b6b80; }
        .toggle { position: relative; width: 44px; height: 24px; }
        .toggle input { opacity: 0; width: 0; height: 0; }
        .toggle-slider { position: absolute; cursor: pointer; top:0; left:0; right:0; bottom:0; background: #2a2a3a; border-radius: 12px; transition: 0.2s; }
        .toggle-slider:before { content:""; position: absolute; height: 18px; width: 18px; left: 3px; bottom: 3px; background: #6b6b80; border-radius: 50%; transition: 0.2s; }
        .toggle input:checked + .toggle-slider { background: #00f5d4; }
        .toggle input:checked + .toggle-slider:before { transform: translateX(20px); background: #0a0a0f; }
        .mode-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .mode-btn { padding: 14px; background: #14141c; border: 1px solid #2a2a3a; border-radius: 10px; color: #6b6b80; font-size: 13px; font-weight: 500; cursor: pointer; }
        .mode-btn.active { border-color: #00f5d4; color: #00f5d4; background: rgba(0,245,212,0.08); }
        .theme-row { display: flex; gap: 12px; flex-wrap: wrap; }
        .theme-swatch { width: 36px; height: 36px; border-radius: 50%; border: 2px solid #2a2a3a; cursor: pointer; }
        .theme-swatch.active { border-color: #e4e4ef; box-shadow: 0 0 12px currentColor; }
        .cycle-toggle-row { display: flex; align-items: center; gap: 8px; margin-top: 12px; font-size: 13px; color: #6b6b80; cursor: pointer; }
        .cycle-toggle-row input { margin: 0; }
        .panel-footer { text-align: center; font-size: 11px; color: #6b6b80; padding-top: 8px; border-top: 1px solid #2a2a3a; margin-top: auto; }

        /* Visualizer */
        #viz-canvas { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; }
        #close-btn { display: none; position: fixed; top: 10px; right: 10px; z-index: 999;
            background: rgba(255,255,255,0.2); color: #fff; border: 1px solid rgba(255,255,255,0.3);
            border-radius: 6px; padding: 8px 16px; font-size: 14px; cursor: pointer; }
        #close-btn:hover { background: rgba(255,255,255,0.3); }
        #debug { display: none; position: fixed; bottom: 10px; left: 10px; z-index: 999;
            color: #0f0; font-family: monospace; font-size: 12px; pointer-events: none; }
    </style>
</head>
<body>
    <div id="fatal-error"></div>

    <!-- Control panel -->
    <div id="control-panel">
        <div class="panel-header">
            <h1 class="logo">SkinnyV</h1>
            <div class="status-pill" id="status-pill">
                <span class="status-dot" id="status-dot"></span>
                <span id="status-text">Idle</span>
            </div>
        </div>
        <div class="panel-section">
            <h2>Audio Source</h2>
            <select id="device-select" class="select"></select>
            <button id="capture-toggle" class="btn btn-primary">Start Capture</button>
        </div>
        <div class="panel-section">
            <h2>Displays</h2>
            <div id="monitor-list" class="monitor-list"><div class="monitor-card">Loading...</div></div>
        </div>
        <div class="panel-section">
            <h2>Visualization Mode</h2>
            <div class="mode-grid" id="mode-grid">
                <button class="mode-btn active" data-mode="spectrum">Spectrum</button>
                <button class="mode-btn" data-mode="waveform">Waveform</button>
                <button class="mode-btn" data-mode="circular">Circular</button>
                <button class="mode-btn" data-mode="particles">Particles</button>
                <button class="mode-btn" data-mode="radial">Radial Bars</button>
                <button class="mode-btn" data-mode="tunnel">Tunnel</button>
                <button class="mode-btn" data-mode="starburst">Starburst</button>
                <button class="mode-btn" data-mode="wave">Wave Sea</button>
                <button class="mode-btn" data-mode="mirror">Mirror</button>
                <button class="mode-btn" data-mode="matrix">Matrix Rain</button>
            </div>
        </div>
        <div class="panel-section">
            <h2>Color Theme</h2>
            <div class="theme-row" id="theme-row">
                <button class="theme-swatch active" data-theme="aurora" style="background:#00f5d4"></button>
                <button class="theme-swatch" data-theme="sunset" style="background:#f15bb5"></button>
                <button class="theme-swatch" data-theme="electric" style="background:#00bbf9"></button>
                <button class="theme-swatch" data-theme="fire" style="background:#ff6b35"></button>
                <button class="theme-swatch" data-theme="mono" style="background:#ffffff"></button>
                <button class="theme-swatch" data-theme="forest" style="background:#06d6a0"></button>
                <button class="theme-swatch" data-theme="candy" style="background:#ff70a6"></button>
                <button class="theme-swatch" data-theme="cyber" style="background:#f72585"></button>
                <button class="theme-swatch" data-theme="deepsea" style="background:#0466c8"></button>
                <button class="theme-swatch" data-theme="gold" style="background:#ffd60a"></button>
                <button class="theme-swatch" data-theme="vapor" style="background:#c77dff"></button>
                <button class="theme-swatch" data-theme="blood" style="background:#ef233c"></button>
            </div>
            <label class="cycle-toggle-row">
                <input type="checkbox" id="theme-cycle">
                <span>Auto-cycle themes</span>
            </label>
        </div>
        <div class="panel-footer"><span>SkinnyV 0.1.0 · GPL-3.0</span></div>
    </div>

    <!-- Visualizer -->
    <canvas id="viz-canvas"></canvas>
    <button id="close-btn">✕ Close (ESC)</button>
    <div id="debug">boot</div>

    <script>
        // Global error catch — show ANY JS error on screen
        window.onerror = function(msg, src, line, col, err) {
            var el = document.getElementById("fatal-error");
            el.style.display = "block";
            el.textContent = "JS ERROR: " + msg + " (line " + line + ":" + col + ") " + (err && err.stack ? err.stack : "");
            return false;
        };

        var dbg = document.getElementById("debug");
        function dlog(msg) {
            if (dbg) { dbg.textContent = msg; }
            console.log("[SkinnyV] " + msg);
        }

        dlog("script start");

        // Show debug immediately so we can see what happens
        dbg.style.display = "block";

        // Determine role: check Tauri window label, or fall back to URL hash
        function getRole() {
            // Method 1: Tauri window label
            try {
                if (window.__TAURI__ && window.__TAURI__.window) {
                    var label = window.__TAURI__.window.getCurrentWindow().label;
                    dlog("label from Tauri: " + label);
                    if (label && label.indexOf("visualizer") === 0) return "viz";
                    if (label && label === "control") return "control";
                }
            } catch(e) {
                dlog("Tauri label check failed: " + e);
            }

            // Method 2: URL hash
            if (window.location.hash === "#viz") return "viz";

            // Method 3: check if __TAURI__ exists at all
            dlog("__TAURI__ present: " + (!!window.__TAURI__));
            if (!window.__TAURI__) return "control"; // fallback

            return "control";
        }

        function init() {
            var role = getRole();
            dlog("role: " + role);
            if (role === "viz") {
                startVisualizer();
            } else {
                startControl();
            }
        }

        // Try immediately, then retry after delay if Tauri isn't ready
        var role = getRole();
        if (window.__TAURI__) {
            init();
        } else {
            dlog("no __TAURI__ yet, retrying...");
            var tries = 0;
            var timer = setInterval(function() {
                tries++;
                if (window.__TAURI__ || tries > 50) {
                    clearInterval(timer);
                    init();
                } else {
                    dlog("waiting for Tauri... " + tries);
                }
            }, 100);
        }

        // ────────────────────────────────────────────────────────
        // CONTROL PANEL
        // ────────────────────────────────────────────────────────
        function startControl() {
            dlog("starting control panel");
            document.getElementById("control-panel").style.display = "flex";

            if (!window.__TAURI__ || !window.__TAURI__.core) {
                document.getElementById("monitor-list").innerHTML = "Tauri API not available";
                return;
            }

            var invoke = window.__TAURI__.core.invoke;
            var emit = window.__TAURI__.event ? window.__TAURI__.event.emit : null;

            // Load devices
            invoke("list_audio_devices").then(function(devices) {
                var sel = document.getElementById("device-select");
                if (!devices || devices.length === 0) {
                    sel.innerHTML = '<option value="">No devices found</option>';
                    return;
                }
                sel.innerHTML = devices.map(function(d) {
                    return '<option value="' + d.id + '" ' + (d.is_default ? "selected" : "") + ">" +
                        d.name + (d.is_default ? " (Default)" : "") + "</option>";
                }).join("");
            }).catch(function(e) { dlog("list_audio_devices error: " + e); });

            // Load monitors
            invoke("list_monitors").then(function(monitors) {
                var list = document.getElementById("monitor-list");
                if (!monitors || monitors.length === 0) {
                    list.innerHTML = '<div class="monitor-card">No monitors detected</div>';
                    return;
                }
                list.innerHTML = monitors.map(function(m) {
                    return '<div class="monitor-card ' + (m.is_primary ? "primary" : "") + '">' +
                        '<div class="monitor-info"><span class="monitor-name">' + m.name +
                        (m.is_primary ? " (Primary)" : "") + '</span><span class="monitor-res">' +
                        m.width + "x" + m.height + "</span></div>" +
                        '<label class="toggle"><input type="checkbox" data-monitor="' + m.id +
                        '" class="monitor-toggle"><span class="toggle-slider"></span></label></div>';
                }).join("");

                document.querySelectorAll(".monitor-toggle").forEach(function(cb) {
                    cb.addEventListener("change", function(e) {
                        var monitorId = parseInt(e.target.dataset.monitor);
                        if (e.target.checked) {
                            invoke("open_visualizer_window", { monitorId: monitorId })
                                .catch(function(err) { dlog("open viz error: " + err); e.target.checked = false; });
                        } else {
                            invoke("close_visualizer_window", { monitorId: monitorId })
                                .catch(function(err) { dlog("close viz error: " + err); });
                        }
                    });
                });
            }).catch(function(e) { dlog("list_monitors error: " + e); });

            // Capture button
            var captureBtn = document.getElementById("capture-toggle");
            var deviceSelect = document.getElementById("device-select");

            captureBtn.onclick = function() {
                dlog("capture button clicked, running=" + captureBtn.dataset.running);
                var running = captureBtn.dataset.running === "true";
                if (running) {
                    dlog("calling stop_capture");
                    invoke("stop_capture").then(function() {
                        dlog("stop_capture returned OK");
                        captureBtn.textContent = "Start Capture";
                        captureBtn.dataset.running = "false";
                        captureBtn.className = "btn btn-primary";
                        document.getElementById("status-dot").classList.remove("active");
                        document.getElementById("status-text").textContent = "Idle";
                    }).catch(function(e) { dlog("stop_capture error: " + e); });
                } else {
                    var deviceId = deviceSelect.value || null;
                    dlog("calling start_capture, device=" + deviceId);
                    invoke("start_capture", { deviceId: deviceId }).then(function() {
                        dlog("start_capture returned OK");
                        captureBtn.textContent = "Stop Capture";
                        captureBtn.dataset.running = "true";
                        captureBtn.className = "btn btn-stop";
                        document.getElementById("status-dot").classList.add("active");
                        document.getElementById("status-text").textContent = "Capturing";
                    }).catch(function(e) { dlog("start_capture error: " + e); });
                }
            };

            // Mode buttons
            document.querySelectorAll(".mode-btn").forEach(function(btn) {
                btn.onclick = function() {
                    document.querySelectorAll(".mode-btn").forEach(function(b) { b.classList.remove("active"); });
                    btn.classList.add("active");
                    var m = btn.dataset.mode;
                    localStorage.setItem("skinnyv-mode", m);
                    if (emit) emit("settings-change", { key: "mode", value: m });
                };
            });

            // Theme buttons
            document.querySelectorAll(".theme-swatch").forEach(function(btn) {
                btn.onclick = function() {
                    document.querySelectorAll(".theme-swatch").forEach(function(b) { b.classList.remove("active"); });
                    btn.classList.add("active");
                    var t = btn.dataset.theme;
                    localStorage.setItem("skinnyv-theme", t);
                    if (emit) emit("settings-change", { key: "theme", value: t });
                };
            });

            // Theme cycle toggle
            var cycleCheckbox = document.getElementById("theme-cycle");
            var cycleInterval = null;
            var cycleThemeNames = ["aurora","sunset","electric","fire","mono","forest","candy","cyber","deepsea","gold","vapor","blood"];
            cycleCheckbox.onchange = function() {
                var cycling = cycleCheckbox.checked;
                localStorage.setItem("skinnyv-cycle", cycling ? "true" : "false");
                if (emit) emit("settings-change", { key: "cycle", value: cycling });
                if (cycling) {
                    cycleInterval = setInterval(function() {
                        var swatches = document.querySelectorAll(".theme-swatch");
                        var activeIdx = 0;
                        swatches.forEach(function(s, i) { if (s.classList.contains("active")) activeIdx = i; });
                        activeIdx = (activeIdx + 1) % swatches.length;
                        swatches.forEach(function(s) { s.classList.remove("active"); });
                        swatches[activeIdx].classList.add("active");
                        var t = swatches[activeIdx].dataset.theme;
                        localStorage.setItem("skinnyv-theme", t);
                        if (emit) emit("settings-change", { key: "theme", value: t });
                    }, 8000);
                } else {
                    if (cycleInterval) { clearInterval(cycleInterval); cycleInterval = null; }
                }
            };
            // Restore cycle state from localStorage
            if (localStorage.getItem("skinnyv-cycle") === "true") {
                cycleCheckbox.checked = true;
                cycleCheckbox.onchange();
            }
        }

        // ────────────────────────────────────────────────────────
        // VISUALIZER
        // ────────────────────────────────────────────────────────
        function startVisualizer() {
            dlog("starting visualizer");
            document.getElementById("control-panel").style.display = "none";
            document.getElementById("viz-canvas").style.display = "block";
            document.getElementById("close-btn").style.display = "block";

            var canvas = document.getElementById("viz-canvas");
            var ctx = canvas.getContext("2d");

            var mode = localStorage.getItem("skinnyv-mode") || "spectrum";
            var theme = localStorage.getItem("skinnyv-theme") || "aurora";
            var bins = new Float32Array(128);
            var volume = 0, beatPulse = 0;
            var smoothedBins = new Float32Array(128);
            var waveformHistory = [];
            var particles = [];
            // State for new modes
            var tunnelPhase = 0;
            var starburstRays = [];
            var waveSeaPhase = 0;
            var mirrorPhase = 0;
            var matrixCols = [];
            var matrixInit = false;

            var THEMES = {
                aurora:  ["#00f5d4","#00bbf9","#9b5de5","#f15bb5"],
                sunset:  ["#ff6b35","#f7931e","#f15bb5","#fee440"],
                electric:["#00bbf9","#00f5d4","#0077b6","#03045e"],
                fire:    ["#ff6b35","#f72585","#ffba08","#dc2f02"],
                mono:    ["#ffffff","#cccccc","#888888","#444444"],
                forest:  ["#06d6a0","#118ab2","#073b4c","#80ed99"],
                candy:   ["#ff70a6","#ff9770","#ffd670","#70d6ff"],
                cyber:   ["#f72585","#b5179e","#7209b7","#480ca8"],
                deepsea: ["#0466c8","#0353a4","#48cae4","#90e0ef"],
                gold:    ["#ffd60a","#ffc300","#ff9500","#ff6b35"],
                vapor:   ["#c77dff","#e0aaff","#9d4edd","#5a189a"],
                blood:   ["#ef233c","#d90429","#8d0801","#590d0d"],
            };
            var themeNames = Object.keys(THEMES);

            function resize() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
            resize();
            window.addEventListener("resize", resize);

            // Close
            document.getElementById("close-btn").onclick = function() {
                dlog("close clicked");
                try { window.__TAURI__.window.getCurrentWindow().close(); } catch(e) { dlog("close error: " + e); window.close(); }
            };
            window.addEventListener("keydown", function(e) {
                if (e.key === "Escape") {
                    try { window.__TAURI__.window.getCurrentWindow().close(); } catch(e) { window.close(); }
                }
            });

            // Connect Tauri events
            if (window.__TAURI__ && window.__TAURI__.event) {
                window.__TAURI__.event.listen("audio-data", function(event) {
                    var d = event.payload;
                    if (d && d.bins) {
                        bins = new Float32Array(d.bins);
                        volume = d.volume;
                        if (d.beat) beatPulse = 1.0;
                    }
                });
                window.__TAURI__.event.listen("settings-change", function(event) {
                    var p = event.payload;
                    if (p.key === "mode") mode = p.value;
                    if (p.key === "theme") theme = p.value;
                    if (p.key === "cycle") {
                        cycleThemes = p.value;
                        if (cycleThemes) startCycle(); else stopCycle();
                    }
                });
                dlog("events connected");

                // Theme cycling
                var cycleThemes = localStorage.getItem("skinnyv-cycle") === "true";
                var cycleTimer = null;
                function startCycle() {
                    if (cycleTimer) clearInterval(cycleTimer);
                    cycleTimer = setInterval(function() {
                        var idx = themeNames.indexOf(theme);
                        idx = (idx + 1) % themeNames.length;
                        theme = themeNames[idx];
                    }, 8000); // 8 seconds per theme
                }
                function stopCycle() {
                    if (cycleTimer) { clearInterval(cycleTimer); cycleTimer = null; }
                }
                if (cycleThemes) startCycle();
            } else {
                dlog("no Tauri event API");
            }

            function colors() { return THEMES[theme] || THEMES.aurora; }

            function render() {
                ctx.fillStyle = "rgba(0,0,0,0.15)";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                for (var i = 0; i < bins.length; i++)
                    smoothedBins[i] = smoothedBins[i] * 0.7 + bins[i] * 0.3;
                beatPulse *= 0.92;
                try {
                    if (mode === "spectrum") renderSpectrum();
                    else if (mode === "waveform") renderWaveform();
                    else if (mode === "circular") renderCircular();
                    else if (mode === "particles") renderParticles();
                    else if (mode === "radial") renderRadial();
                    else if (mode === "tunnel") renderTunnel();
                    else if (mode === "starburst") renderStarburst();
                    else if (mode === "wave") renderWaveSea();
                    else if (mode === "mirror") renderMirror();
                    else if (mode === "matrix") renderMatrix();
                } catch(e) {}
                requestAnimationFrame(render);
            }

            function renderSpectrum() {
                var c = colors(), w = canvas.width, h = canvas.height;
                var n = 96, bw = w / n, gap = bw * 0.12;
                for (var i = 0; i < n; i++) {
                    var v = smoothedBins[Math.floor((i/n)*smoothedBins.length)];
                    var bh = v*h*0.95, x = i*bw+gap/2, y = h-bh;
                    var col = c[Math.min(Math.floor((i/n)*c.length), c.length-1)];
                    ctx.fillStyle = col; ctx.fillRect(x,y,bw-gap,bh);
                    ctx.shadowBlur = 30*v; ctx.shadowColor = col; ctx.fillRect(x,y,bw-gap,bh); ctx.shadowBlur = 0;
                    ctx.globalAlpha = 0.25; ctx.fillRect(x,h,bw-gap,-bh*0.5); ctx.globalAlpha = 1;
                }
                if (beatPulse > 0.1) { ctx.fillStyle = "rgba(255,255,255,"+(beatPulse*0.08)+")"; ctx.fillRect(0,0,w,h); }
            }

            function renderWaveform() {
                var c = colors(), w = canvas.width, h = canvas.height, mid = h/2;
                var f = new Float32Array(smoothedBins.length);
                for (var i=0; i<smoothedBins.length; i++) f[i] = smoothedBins[i];
                waveformHistory.push(f);
                if (waveformHistory.length > 8) waveformHistory.shift();
                for (var l=0; l<waveformHistory.length; l++) {
                    var d = waveformHistory[l];
                    ctx.strokeStyle = c[l%c.length]; ctx.globalAlpha = (l+1)/waveformHistory.length*0.7;
                    ctx.lineWidth = 3; ctx.beginPath();
                    for (var i=0; i<d.length; i++) { var x=(i/d.length)*w, y=mid+(d[i]-0.5)*h*0.9; if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y); }
                    ctx.stroke();
                }
                ctx.globalAlpha = 1; ctx.strokeStyle = c[0]; ctx.lineWidth = 6;
                ctx.shadowBlur = 25; ctx.shadowColor = c[0]; ctx.beginPath();
                for (var i=0; i<smoothedBins.length; i++) { var x=(i/smoothedBins.length)*w, y=mid+(smoothedBins[i]-0.5)*h*0.9; if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y); }
                ctx.stroke(); ctx.shadowBlur = 0;
            }

            function renderCircular() {
                var c = colors(), w = canvas.width, h = canvas.height;
                var cx=w/2, cy=h/2, br=Math.min(w,h)*0.35, me=Math.min(w,h)*0.4, segs=128;
                for (var i=0; i<segs; i++) {
                    var a=(i/segs)*Math.PI*2-Math.PI/2, v=smoothedBins[Math.floor((i/segs)*smoothedBins.length)];
                    var r2=br+v*me, col=c[Math.floor((i/segs)*c.length)%c.length];
                    ctx.strokeStyle=col; ctx.lineWidth=5; ctx.shadowBlur=15*v; ctx.shadowColor=col; ctx.beginPath();
                    ctx.moveTo(cx+Math.cos(a)*br, cy+Math.sin(a)*br); ctx.lineTo(cx+Math.cos(a)*r2, cy+Math.sin(a)*r2); ctx.stroke();
                }
                ctx.shadowBlur=0;
                if (beatPulse>0.1) { ctx.strokeStyle=c[0]; ctx.globalAlpha=beatPulse*0.6; ctx.lineWidth=4;
                    ctx.beginPath(); ctx.arc(cx,cy,br*(1+beatPulse*0.3),0,Math.PI*2); ctx.stroke(); ctx.globalAlpha=1; }
                var g=ctx.createRadialGradient(cx,cy,0,cx,cy,br); g.addColorStop(0,c[0]+"60"); g.addColorStop(1,"transparent");
                ctx.fillStyle=g; ctx.fillRect(cx-br,cy-br,br*2,br*2);
            }

            function renderParticles() {
                var c=colors(), w=canvas.width, h=canvas.height, cx=w/2, cy=h/2;
                if (beatPulse>0.5) { var n=Math.floor(beatPulse*40); for (var i=0;i<n;i++) { var a=Math.random()*Math.PI*2, s=2+Math.random()*12*(volume*10);
                    particles.push({x:cx,y:cy,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:1,col:c[Math.floor(Math.random()*c.length)],sz:3+Math.random()*8}); } }
                if (volume>0.01) { var n2=Math.floor(volume*15); for (var i=0;i<n2;i++) { var a2=Math.random()*Math.PI*2, s2=1+Math.random()*6*(volume*10);
                    particles.push({x:cx+(Math.random()-0.5)*w*0.3,y:cy+(Math.random()-0.5)*h*0.3,vx:Math.cos(a2)*s2,vy:Math.sin(a2)*s2,life:1,col:c[Math.floor(Math.random()*c.length)],sz:2+Math.random()*6}); } }
                for (var i=particles.length-1;i>=0;i--) { var p=particles[i]; p.x+=p.vx; p.y+=p.vy; p.vx*=0.99; p.vy*=0.99; p.life-=0.008;
                    if (p.life<=0||p.x<-100||p.x>w+100||p.y<-100||p.y>h+100) { particles.splice(i,1); continue; }
                    ctx.globalAlpha=p.life; ctx.fillStyle=p.col; ctx.shadowBlur=p.sz*4; ctx.shadowColor=p.col;
                    ctx.beginPath(); ctx.arc(p.x,p.y,p.sz,0,Math.PI*2); ctx.fill(); }
                ctx.globalAlpha=1; ctx.shadowBlur=0; if (particles.length>3000) particles.splice(0,particles.length-3000);
            }

            // ── RADIAL BARS ─────────────────────────────────────────
            // Bars radiating outward from center, like a sun
            function renderRadial() {
                var c = colors(), w = canvas.width, h = canvas.height;
                var cx = w/2, cy = h/2;
                var maxR = Math.min(w, h) * 0.48;
                var bars = 72;
                var innerR = Math.min(w, h) * 0.08;

                for (var i = 0; i < bars; i++) {
                    var angle = (i / bars) * Math.PI * 2;
                    var binIdx = Math.floor((i / bars) * smoothedBins.length);
                    var v = smoothedBins[binIdx];
                    var barLen = v * (maxR - innerR);
                    var r1 = innerR, r2 = innerR + barLen;

                    var x1 = cx + Math.cos(angle) * r1, y1 = cy + Math.sin(angle) * r1;
                    var x2 = cx + Math.cos(angle) * r2, y2 = cy + Math.sin(angle) * r2;

                    var col = c[Math.floor((i / bars) * c.length) % c.length];
                    ctx.strokeStyle = col;
                    ctx.lineWidth = (Math.PI * 2 * r1 / bars) * 0.7;
                    ctx.shadowBlur = 20 * v; ctx.shadowColor = col;
                    ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke();

                    // Dot at the tip
                    if (v > 0.1) {
                        ctx.fillStyle = col;
                        ctx.beginPath(); ctx.arc(x2, y2, 3 + v * 5, 0, Math.PI * 2); ctx.fill();
                    }
                }
                ctx.shadowBlur = 0;

                // Pulsing inner ring
                var ringR = innerR * (1 + beatPulse * 0.5);
                ctx.strokeStyle = c[0]; ctx.globalAlpha = 0.3 + beatPulse * 0.4;
                ctx.lineWidth = 2 + beatPulse * 4;
                ctx.beginPath(); ctx.arc(cx, cy, ringR, 0, Math.PI * 2); ctx.stroke();
                ctx.globalAlpha = 1;
            }

            // ── TUNNEL ──────────────────────────────────────────────
            // Concentric rotating polygons that zoom toward you
            function renderTunnel() {
                var c = colors(), w = canvas.width, h = canvas.height;
                var cx = w/2, cy = h/2;
                var maxR = Math.min(w, h) * 0.7;
                tunnelPhase += 0.015 + volume * 0.05;

                var rings = 20;
                for (var r = rings; r >= 0; r--) {
                    var t = (r + tunnelPhase % 1) / rings;
                    var radius = t * maxR;
                    if (radius < 2) continue;
                    var sides = 6;
                    var rot = tunnelPhase * 0.5 + r * 0.3;
                    var alpha = (1 - t) * 0.8;
                    var colIdx = Math.floor(t * c.length) % c.length;
                    var col = c[colIdx];

                    ctx.globalAlpha = alpha;
                    ctx.strokeStyle = col;
                    ctx.lineWidth = 2 + (1 - t) * 4;
                    ctx.shadowBlur = 15 * (1 - t); ctx.shadowColor = col;
                    ctx.beginPath();
                    for (var s = 0; s <= sides; s++) {
                        var a = (s / sides) * Math.PI * 2 + rot;
                        var px = cx + Math.cos(a) * radius, py = cy + Math.sin(a) * radius;
                        if (s === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
                    }
                    ctx.stroke();
                }
                ctx.globalAlpha = 1; ctx.shadowBlur = 0;

                // Beat flash from center
                if (beatPulse > 0.1) {
                    var g = ctx.createRadialGradient(cx, cy, 0, cx, cy, maxR * 0.3);
                    g.addColorStop(0, c[0] + "aa"); g.addColorStop(1, "transparent");
                    ctx.globalAlpha = beatPulse * 0.5; ctx.fillStyle = g;
                    ctx.fillRect(0, 0, w, h); ctx.globalAlpha = 1;
                }
            }

            // ── STARBURST ───────────────────────────────────────────
            // Rays shooting from center, length driven by freq bins
            function renderStarburst() {
                var c = colors(), w = canvas.width, h = canvas.height;
                var cx = w/2, cy = h/2;
                var maxR = Math.min(w, h) * 0.5;

                // Init rays
                if (starburstRays.length === 0) {
                    for (var i = 0; i < 128; i++) {
                        starburstRays.push({ angle: (i/128) * Math.PI * 2, len: 0, target: 0 });
                    }
                }

                for (var i = 0; i < starburstRays.length; i++) {
                    var ray = starburstRays[i];
                    var binIdx = Math.floor((i / starburstRays.length) * smoothedBins.length);
                    ray.target = smoothedBins[binIdx] * maxR;
                    ray.len = ray.len * 0.8 + ray.target * 0.2;

                    var col = c[Math.floor((i / starburstRays.length) * c.length) % c.length];
                    var x2 = cx + Math.cos(ray.angle) * ray.len;
                    var y2 = cy + Math.sin(ray.angle) * ray.len;

                    // Tapered ray
                    ctx.strokeStyle = col;
                    ctx.lineWidth = 1 + (ray.len / maxR) * 4;
                    ctx.shadowBlur = 10 * (ray.len / maxR); ctx.shadowColor = col;
                    ctx.globalAlpha = 0.4 + (ray.len / maxR) * 0.6;
                    ctx.beginPath(); ctx.moveTo(cx, cy); ctx.lineTo(x2, y2); ctx.stroke();

                    // Star at tip on strong hits
                    if (ray.len > maxR * 0.5) {
                        ctx.fillStyle = col;
                        ctx.beginPath(); ctx.arc(x2, y2, 2 + (ray.len/maxR)*4, 0, Math.PI*2); ctx.fill();
                    }
                }
                ctx.globalAlpha = 1; ctx.shadowBlur = 0;

                // Central glow
                var cg = ctx.createRadialGradient(cx, cy, 0, cx, cy, maxR * 0.15);
                cg.addColorStop(0, c[0] + "80"); cg.addColorStop(1, "transparent");
                ctx.fillStyle = cg; ctx.fillRect(cx - maxR*0.15, cy - maxR*0.15, maxR*0.3, maxR*0.3);
            }

            // ── WAVE SEA ─────────────────────────────────────────────
            // Multiple sine wave layers flowing across screen, like an ocean
            function renderWaveSea() {
                var c = colors(), w = canvas.width, h = canvas.height;
                waveSeaPhase += 0.02 + volume * 0.03;
                var layers = 6;
                var amp = h * 0.12 * (1 + volume * 2);

                for (var l = 0; l < layers; l++) {
                    var baseY = h * (0.3 + l * 0.08);
                    var freq = 0.003 + l * 0.001;
                    var phase = waveSeaPhase + l * 0.5;
                    var binOffset = Math.floor((l / layers) * smoothedBins.length);
                    var binVal = smoothedBins[binOffset];
                    var col = c[l % c.length];

                    ctx.strokeStyle = col;
                    ctx.lineWidth = 2 + l * 0.5;
                    ctx.globalAlpha = 0.3 + (l / layers) * 0.5;
                    ctx.shadowBlur = 10; ctx.shadowColor = col;
                    ctx.beginPath();

                    for (var x = 0; x <= w; x += 3) {
                        var wave1 = Math.sin(x * freq + phase) * amp;
                        var wave2 = Math.sin(x * freq * 2.3 + phase * 1.7) * amp * 0.4;
                        var modAmp = amp * (1 + binVal * 2);
                        var y = baseY + wave1 + wave2;
                        if (x === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
                    }
                    ctx.stroke();

                    // Fill below the wave
                    ctx.globalAlpha = 0.05 + (l / layers) * 0.05;
                    ctx.lineTo(w, h); ctx.lineTo(0, h); ctx.closePath();
                    ctx.fillStyle = col; ctx.fill();
                }
                ctx.globalAlpha = 1; ctx.shadowBlur = 0;
            }

            // ── MIRROR ──────────────────────────────────────────────
            // Symmetric kaleidoscope-like mirror of spectrum bars
            function renderMirror() {
                var c = colors(), w = canvas.width, h = canvas.height;
                mirrorPhase += 0.005 + volume * 0.02;
                var cx = w/2, cy = h/2;
                var bars = 48;
                var maxBar = Math.min(w, h) * 0.45;

                ctx.save();
                ctx.translate(cx, cy);

                // Draw 4 mirrored quadrants
                for (var quad = 0; quad < 4; quad++) {
                    ctx.save();
                    ctx.rotate(quad * Math.PI / 2 + mirrorPhase);

                    for (var i = 0; i < bars / 4; i++) {
                        var binIdx = Math.floor((i / (bars/4)) * smoothedBins.length * 0.5);
                        var v = smoothedBins[binIdx];
                        var barH = v * maxBar;
                        var bw = (Math.PI * 2 * maxBar) / bars * 2;
                        var col = c[Math.floor((i / (bars/4)) * c.length) % c.length];

                        ctx.fillStyle = col;
                        ctx.shadowBlur = 15 * v; ctx.shadowColor = col;
                        ctx.fillRect(i * bw, 0, bw * 0.8, barH);
                    }
                    ctx.restore();
                }
                ctx.restore();
                ctx.shadowBlur = 0;

                // Center pulse
                if (beatPulse > 0.1) {
                    ctx.strokeStyle = c[0]; ctx.globalAlpha = beatPulse * 0.4; ctx.lineWidth = 3;
                    ctx.beginPath(); ctx.arc(cx, cy, 20 + beatPulse * 30, 0, Math.PI * 2); ctx.stroke();
                    ctx.globalAlpha = 1;
                }
            }

            // ── MATRIX RAIN ─────────────────────────────────────────
            // Audio-reactive digital rain (Matrix-style)
            function renderMatrix() {
                var c = colors(), w = canvas.width, h = canvas.height;
                var colW = 14;
                var numCols = Math.floor(w / colW);

                if (!matrixInit) {
                    for (var i = 0; i < numCols; i++) {
                        matrixCols.push({ y: Math.random() * h, speed: 2 + Math.random() * 6, len: 5 + Math.floor(Math.random() * 20) });
                    }
                    matrixInit = true;
                }

                ctx.font = "14px monospace";
                ctx.textAlign = "center";

                for (var i = 0; i < matrixCols.length; i++) {
                    var col = matrixCols[i];
                    var binIdx = Math.floor((i / numCols) * smoothedBins.length);
                    var v = smoothedBins[binIdx];
                    col.y += col.speed * (1 + v * 3);
                    if (col.y > h + col.len * 14) {
                        col.y = -col.len * 14;
                        col.speed = 2 + Math.random() * 6;
                    }

                    var x = i * colW + colW / 2;
                    for (var j = 0; j < col.len; j++) {
                        var charY = col.y - j * 14;
                        if (charY < 0 || charY > h) continue;
                        var brightness = 1 - (j / col.len);
                        var char = String.fromCharCode(0x30A0 + Math.floor(Math.random() * 96));

                        if (j === 0) {
                            ctx.fillStyle = "#ffffff";
                            ctx.globalAlpha = 1;
                            ctx.shadowBlur = 8; ctx.shadowColor = c[0];
                        } else {
                            ctx.fillStyle = c[Math.floor(brightness * c.length) % c.length];
                            ctx.globalAlpha = brightness * (0.4 + v * 0.6);
                            ctx.shadowBlur = 0;
                        }
                        ctx.fillText(char, x, charY);
                    }
                }
                ctx.globalAlpha = 1; ctx.shadowBlur = 0;
            }

            // Start render loop
            ctx.fillStyle = "#000"; ctx.fillRect(0, 0, canvas.width, canvas.height);
            dlog("render loop starting");
            requestAnimationFrame(render);
        }
    </script>
</body>
